<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Beyond Victories</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav>
        <div class="container nav-content">
            <a href="../index.html" class="logo">Beyond<span class="gradient-text">Victories</span></a>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="glass-panel auth-card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Log in to manage your smart boxes</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Login</button>
            </form>
            
            <p class="text-center mt-4">
                Don't have an account? <a href="register.html" style="color: var(--primary);">Register</a>
            </p>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const data = await apiCall('/api/auth/login', 'POST', { email, password });
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data));
                
                // Redirect based on role
                if (data.role === 'admin') window.location.href = '../admin.html';
                else if (data.role === 'staff') window.location.href = '../staff-dashboard.html';
                else window.location.href = '../dashboard.html';
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>
</html>
