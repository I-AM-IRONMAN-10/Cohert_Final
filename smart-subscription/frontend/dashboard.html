<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Beyond Victories</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .stat-card {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }
        .order-history-item {
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .order-history-item:last-child {
            border-bottom: none;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
        }
        .status-badge.delivered {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="logo">Beyond<span class="gradient-text">Victories</span></a>
            <div class="nav-links">
                <a href="upcoming-box.html">Upcoming Box</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container dashboard-layout">
        <aside class="sidebar">
            <a href="dashboard.html" class="active">Overview</a>
            <a href="upcoming-box.html">Upcoming Box (Swap)</a>
            <a href="user/preference-quiz.html">Edit Preferences</a>
            <a href="plans.html">Browse Plans</a>
        </aside>

        <main>
            <h2 class="mb-8" id="welcomeMsg">Welcome</h2>

            <div class="dashboard-grid">
                <div class="glass-panel stat-card">
                    <span class="text-muted">Loyalty Points</span>
                    <span class="stat-value" id="loyaltyPoints">--</span>
                    <small class="text-muted">Redeem for discounts!</small>
                </div>
                <div class="glass-panel stat-card">
                    <span class="text-muted">Referral Code</span>
                    <span class="stat-value" id="refCode" style="font-size: 1.5rem; color: white;">--</span>
                    <small class="text-muted" style="cursor: pointer; color: var(--primary);" onclick="copyRef()">Click to copy</small>
                </div>
                <div class="glass-panel stat-card">
                    <span class="text-muted">Active Subscriptions</span>
                    <span class="stat-value" id="activeSubsCount">--</span>
                </div>
            </div>

            <div class="glass-panel mb-8" style="padding: 24px;">
                <h3 class="mb-4">My Subscriptions</h3>
                <div id="subsList">
                    <p class="text-muted">Loading...</p>
                </div>
            </div>

            <div class="glass-panel" style="padding: 24px;">
                <h3 class="mb-4">Order History</h3>
                <div id="orderList">
                    <p class="text-muted">Loading...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script>
        const user = requireAuth();
        if(user) {
            document.getElementById('welcomeMsg').innerText = `Welcome, ${user.name}`;
            
            // Fetch User Profile for freshest points/ref data
            async function loadProfile() {
                try {
                    const profile = await apiCall('/api/users/profile');
                    document.getElementById('loyaltyPoints').innerText = profile.totalRewardPoints;
                    document.getElementById('refCode').innerText = profile.referralCode;
                } catch (err) {
                    console.error("Profile load failed", err);
                }
            }

            // Fetch Subscriptions
            async function loadSubscriptions() {
                try {
                    const subs = await apiCall('/api/subscriptions');
                    const subsList = document.getElementById('subsList');
                    document.getElementById('activeSubsCount').innerText = subs.length;
                    
                    if(subs.length === 0) {
                        subsList.innerHTML = '<p class="text-muted">No active subscriptions. <a href="plans.html" style="color:var(--primary)">Get one</a></p>';
                        return;
                    }

                    subsList.innerHTML = subs.map(sub => `
                        <div class="order-history-item">
                            <div>
                                <strong>${sub.plan ? sub.plan.name : 'Unknown Plan'}</strong>
                                <div class="text-muted mt-2">Next Delivery: ${new Date(sub.nextDeliveryDate).toLocaleDateString()}</div>
                                ${sub.isGift ? `<div class="text-muted">🎁 Gift for: ${sub.giftReceiverEmail}</div>` : ''}
                            </div>
                            <div style="display:flex; gap:12px; align-items:center;">
                                <span class="status-badge" style="${sub.status === 'paused' ? 'background:rgba(245, 158, 11, 0.2); color:#fbbf24;' : ''}">
                                    ${sub.status.toUpperCase()}
                                </span>
                                ${sub.status === 'active' ? `<button onclick="pauseSub('${sub._id}')" class="btn btn-secondary btn-sm">Pause 1 Mo</button>` : ''}
                                <button onclick="cancelSub('${sub._id}')" class="btn btn-secondary btn-sm" style="color:red; border-color:rgba(255,0,0,0.3)">Cancel</button>
                            </div>
                        </div>
                    `).join('');
                } catch (err) {
                    document.getElementById('subsList').innerHTML = `<p style="color:red;">Error loading subscriptions.</p>`;
                }
            }

            // Fetch Orders
            async function loadOrders() {
                try {
                    const orders = await apiCall('/api/orders/history');
                    const orderList = document.getElementById('orderList');
                    
                    if(orders.length === 0) {
                        orderList.innerHTML = '<p class="text-muted">No past orders.</p>';
                        return;
                    }

                    orderList.innerHTML = orders.map(order => `
                        <div class="order-history-item">
                            <div>
                                <strong>Order #${order._id.substring(0,8)}</strong>
                                <div class="text-muted mt-2">${new Date(order.createdAt).toLocaleDateString()}</div>
                            </div>
                            <div style="text-align: right;">
                                <div class="status-badge ${order.deliveryStatus === 'delivered' ? 'delivered' : ''}">${order.deliveryStatus.replace('-',' ').toUpperCase()}</div>
                                <div class="text-muted mt-2" style="font-size:0.8rem;">Pack: ${order.packingStatus} | Track: ${order.trackingNumber || 'Pending'}</div>
                            </div>
                        </div>
                    `).join('');
                } catch (err) {
                    document.getElementById('orderList').innerHTML = `<p style="color:red;">Error loading orders.</p>`;
                }
            }

            loadProfile();
            loadSubscriptions();
            loadOrders();
        }

        async function pauseSub(id) {
            if(confirm("Are you sure you want to pause this subscription for 1 month?")) {
                try {
                    await apiCall(`/api/subscriptions/${id}/pause`, 'PUT');
                    location.reload();
                } catch(err) { alert(err.message); }
            }
        }

        async function cancelSub(id) {
            if(confirm("Are you sure you want to cancel this subscription completely?")) {
                try {
                    await apiCall(`/api/subscriptions/${id}/cancel`, 'PUT');
                    location.reload();
                } catch(err) { alert(err.message); }
            }
        }

        function copyRef() {
            const code = document.getElementById('refCode').innerText;
            navigator.clipboard.writeText(code);
            alert("Referral code copied! Share it to earn 50 points.");
        }
    </script>
</body>
</html>
